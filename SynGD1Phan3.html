<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Ghép Từ Đồng Nghĩa - PLAYTOEIC GD1P1</title>
    <!-- Tích hợp Canvas Confetti để bắn pháo hoa -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Sử dụng bộ Font chữ bo tròn dễ thương hỗ trợ Tiếng Việt cực tốt -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Quicksand:wght@600;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #ffebf0 0%, #ffcbd7 50%, #ffafc1 100%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #2f3640;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Hệ thống hiệu ứng rơi (Lá và hoa) --- */
        .falling-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .leaf {
            position: absolute;
            top: -50px;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(720deg) translateX(100px); opacity: 0; }
        }

        /* --- Nội dung chính --- */
        .main-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        h1 {
            color: #ff477e;
            text-shadow: 3px 3px 0px #ffffff, 6px 6px 0px rgba(255, 71, 126, 0.2); 
            margin-bottom: 10px;
            text-align: center;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .instructions {
            color: #d93d4a;
            background: #ffffff;
            padding: 12px 26px;
            border-radius: 30px;
            margin-bottom: 25px;
            text-align: center;
            max-width: 700px;
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 6px 0px #ffb7c5, 0 10px 20px rgba(0,0,0,0.06);
            border: 3px solid #ff477e;
        }

        #reset-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            z-index: 10;
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0px #c84141, 0 6px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        #reset-btn:hover { 
            background-color: #e11d48; 
            transform: translateY(-1px); 
        }
        @media (max-width: 600px) {
            #reset-btn {
                position: static;
                margin-bottom: 15px;
            }
        }

        /* Thanh chia phần (Tabs) */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.5);
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: #0369a1;
            transition: all 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tab-btn.active {
            background-color: #0284c7;
            color: white;
            border-color: #0284c7;
        }

        /* Kho chứa từ hiệu ứng gương mờ */
        #vocab-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
            max-width: 1200px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            margin-bottom: 25px;
            min-height: 70px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
        }
        .clickable-word {
            background-color: #0284c7;
            color: white;
            padding: 9px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            user-select: none;
            box-shadow: 0 4px 6px rgba(2, 132, 199, 0.15);
            transition: all 0.15s;
        }
        .clickable-word:hover {
            background-color: #0369a1;
            transform: translateY(-2px);
        }
        .clickable-word.selected {
            background-color: #f97316 !important;
            transform: scale(1.05);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.5);
        }

        /* Thẻ từ bay lơ lửng đi theo chuột */
        #floating-cursor-word {
            position: fixed;
            pointer-events: none;
            background-color: #f97316;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            z-index: 9999;
            display: none;
            transform: translate(15px, 15px);
            white-space: nowrap;
        }

        /* Lưới 3 cột câu hỏi */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 25px;
        }
        @media (max-width: 900px) { #game-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { #game-grid { grid-template-columns: 1fr; } }

        .quiz-card {
            padding: 15px;
            border-radius: 14px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .vietnamese-def {
            font-size: 20px;
            font-weight: 700;
            color: #0f172a;
            min-height: 38px;
            display: flex;
            align-items: center;
        }

        /* Vùng nhận từ */
        .drop-zone {
            border: 2px dashed rgba(2, 132, 199, 0.25);
            border-radius: 10px;
            min-height: 70px;
            background-color: rgba(255, 255, 255, 0.45);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            align-content: flex-start;
            cursor: pointer;
            transition: all 0.2s;
        }
        .drop-zone:hover {
            background-color: rgba(255, 255, 255, 0.75);
            border-color: #0284c7;
        }

        /* Nút điều khiển */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
        }
        #check-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: all 0.2s;
        }
        #check-btn:hover { background-color: #059669; transform: translateY(-1px); }
        
        #result-message {
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            min-height: 24px;
            background: rgba(255,255,255,0.7);
            padding: 4px 12px;
            border-radius: 10px;
        }

        /* --- Hệ thống con trỏ người chơi khác --- */
        .other-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            transition: left 0.08s linear, top 0.08s linear;
        }
        .cursor-pointer {
            width: 0; height: 0;
            border-left: 12px solid #ef4444;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            transform: rotate(-35deg);
        }
        .cursor-pointer-label {
            position: absolute;
            left: 12px; top: 12px;
            background: #ef4444;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .cursor-holding-word {
            position: absolute;
            left: 15px; top: 32px;
            background-color: rgba(249, 115, 22, 0.85);
            color: white;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            animation: pulse-glow 1.5s infinite ease-in-out;
        }
        @keyframes pulse-glow {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
    </style>
</head>
<body>

    <div class="falling-container" id="falling-container"></div>

    <div class="main-content">
        <button id="reset-btn">Reset (3)</button>

        <h1>SYNONYMS - PLAYTOEIC (GD1P3)</h1>
        <p class="instructions" id="status-room">🟢 Hãy ghép từ vào ô tiếng Việt và kiểm tra!</p>

        <!-- Thanh chuyển phần -->
        <div class="tab-container">
            <button class="tab-btn active" id="tab-0">Phần 1</button>
            <button class="tab-btn" id="tab-1">Phần 2</button>
            <button class="tab-btn" id="tab-2">Phần 3</button>
        </div>

        <div id="vocab-pool"></div>
        <div id="game-grid"></div>

        <div class="controls">
            <button id="check-btn">Kiểm tra Phần này</button>
            <div id="result-message"></div>
        </div>
    </div>

    <!-- Nhãn bay lơ lửng đi theo chuột -->
    <div id="floating-cursor-word"></div>

    <!-- Tải Firebase SDK bằng ES Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDMn-gJwwJVQjqN9HxPU2lrmf6_Po0I6ms",
            authDomain: "tudongnghia.firebaseapp.com",
            projectId: "tudongnghia",
            storageBucket: "tudongnghia.firebasestorage.app",
            messagingSenderId: "833032081126",
            appId: "1:833032081126:web:652a90ca22a42be6753527",
            measurementId: "G-H6R7JBL3D1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Dữ liệu tĩnh (Đã làm sạch từ trùng lặp) ---
        const pastelColors = ['rgba(255, 241, 242, 0.7)', 'rgba(254, 243, 199, 0.7)', 'rgba(236, 252, 203, 0.7)', 'rgba(220, 252, 231, 0.7)', 'rgba(224, 242, 254, 0.7)', 'rgba(224, 231, 255, 0.7)', 'rgba(243, 232, 255, 0.7)'];
        const allPartsData = [
            [
		{ "eng": ["access", "entrance", "entryway", "entry", "gate", "way in"], "vi": "(N) : lối vào" },
  		{ "eng": ["obtain", "get", "acquire", "gain", "earn"], "vi": "(V) : lấy, có được" },
  		{ "eng": ["malfunction", "not function", "out of order", "go down", "go wrong", "stop working", "fail", "break down"], "vi": "bị hỏng" },
  		{ "eng": ["customer", "client", "consumer", "patron", "buyer", "purchaser"], "vi": "(N) : khách hàng" },
  		{ "eng": ["expire", "become invalid", "run out"], "vi": "(V) : hết hạn" },
  		{ "eng": ["effort", "attempt", "try", "strive", "endeavor"], "vi": "(N) : cố gắng, nỗ lực" },
  		{ "eng": ["notify", "inform", "announce"], "vi": "(V) : thông báo" },
  		{ "eng": ["perform", "conduct", "carry out", "do", "implement"], "vi": "(V) : thực hiện" },
  		{ "eng": ["penalty", "fine"], "vi": "(N) : tiền phạt" },
  		{ "eng": ["construct", "build"], "vi": "(V) : xây dựng" }
            ],
            [
 		{ "eng": ["inspect", "examine", "check", "go over", "investigation"], "vi": "(V) : kiểm tra, điều tra" },
  		{ "eng": ["former", "previous", "old", "past", "last", "earlier"], "vi": "(adj) : cũ, trước" },
  		{ "eng": ["purpose", "aim", "target", "objective", "goal", "intention", "intent"], "vi": "(N) : mục đích, ý định" },
  		{ "eng": ["supervise", "manage", "oversee", "monitor", "keep track of"], "vi": "(V) : giám sát, theo dõi" },
  		{ "eng": ["banquet", "dinner", "reception", "luncheon", "party"], "vi": "(N) : bữa tiệc" },
  		{ "eng": ["rest", "remainder", "remaining part"], "vi": "(N) : phần còn lại" },
  		{ "eng": ["warehouse", "stockroom", "storage", "storehouse"], "vi": "(N) : nhà kho" },
  		{ "eng": ["creative", "innovative"], "vi": "(adj) : sáng tạo" },
  		{ "eng": ["business", "firm", "company", "organization", "corporation", "enterprise"], "vi": "(N) : doanh nghiệp" },
  		{ "eng": ["commercial", "promotion", "advertisement"], "vi": "(N) : quảng cáo" }
            ],
            [
 		{ "eng": ["alternative", "alternate", "replacement", "substitute"], "vi": "(adj) : thay thế" },
  		{ "eng": ["regularly", "frequently", "often", "normally", "generally"], "vi": "(adv) : thường xuyên, thường thường" },
  		{ "eng": ["recently", "lately", "not long ago", "a short time ago"], "vi": "(adv) : gần đây" },
  		{ "eng": ["rarely", "seldom", "infrequently", "hardly", "scarcely"], "vi": "(adv) : hiếm khi" },
  		{ "eng": ["important", "vital", "crucial", "critical", "essential", "necessary"], "vi": "(adj) : quan trọng, cần thiết" },
  		{ "eng": ["colleague", "coworker", "teammate", "workmate"], "vi": "(N) : đồng nghiệp" },
  		{ "eng": ["journal", "magazine", "periodical", "newspaper"], "vi": "(N) : tạp chí, tờ báo" },
  		{ "eng": ["brochure", "pamphlet", "leaflet", "flyer", "handout"], "vi": "(N) : tờ rơi, sách quảng cáo" },
  		{ "eng": ["assist", "give a hand", "lend a hand", "help", "support", "aid"], "vi": "(V) : hỗ trợ" }
            ]
        ];
        // --- Biến trạng thái Local ---
        let username = prompt("Nhập tên của bạn để tham gia phòng game:", "Người chơi " + Math.floor(Math.random() * 100)) || "Ẩn danh";
        const myUserId = "user_" + Math.random().toString(36).substr(2, 9);
        const myColor = ["#ef4444", "#3b82f6", "#10b981", "#f59e0b", "#8b5cf6", "#ec4899"][Math.floor(Math.random() * 6)];

        let currentPartIndex = 0;
        let selectedWordLocal = null;
        let resetClickCount = 0; 
        let isCheckedState = false; // BIẾN CỜ: Lưu trạng thái khi bấm nút Kiểm tra

        const vocabPool = document.getElementById('vocab-pool');
        const gameGrid = document.getElementById('game-grid');
        const resultMessage = document.getElementById('result-message');
        const floatingEl = document.getElementById('floating-cursor-word');
        const resetBtn = document.getElementById('reset-btn');

        // Khởi tạo Presence
        const myPresenceRef = ref(db, `presence/${myUserId}`);
        set(myPresenceRef, { name: username, color: myColor, x: 0, y: 0, holdingWord: "" });
        onDisconnect(myPresenceRef).remove();

        // Đồng bộ con trỏ người chơi khác
        onValue(ref(db, 'presence'), (snapshot) => {
            const data = snapshot.val();
            const activeIds = data ? Object.keys(data) : [];
            document.querySelectorAll('.other-cursor').forEach(el => {
                const id = el.id.replace('cursor-', '');
                if (!activeIds.includes(id) || id === myUserId) el.remove();
            });

            if (!data) return;

            Object.keys(data).forEach(id => {
                if (id === myUserId) return;
                const user = data[id];
                
                let cursorEl = document.getElementById(`cursor-${id}`);
                if (!cursorEl) {
                    cursorEl = document.createElement('div');
                    cursorEl.id = `cursor-${id}`;
                    cursorEl.className = 'other-cursor';
                    cursorEl.innerHTML = `
                        <div class="cursor-pointer" style="border-left-color: ${user.color}"></div>
                        <div class="cursor-pointer-label" style="background: ${user.color}">${user.name}</div>
                        <div class="cursor-holding-word" style="display: none;"></div>
                    `;
                    document.body.appendChild(cursorEl);
                }
                
                cursorEl.style.left = user.x + 'px';
                cursorEl.style.top = user.y + 'px';

                const holdingEl = cursorEl.querySelector('.cursor-holding-word');
                if (user.holdingWord && user.holdingWord !== "") {
                    holdingEl.innerText = `📄 ${user.holdingWord}`;
                    holdingEl.style.display = 'block';
                } else {
                    holdingEl.style.display = 'none';
                }
            });
        });

        window.addEventListener('mousemove', (e) => {
            set(ref(db, `presence/${myUserId}/x`), e.clientX);
            set(ref(db, `presence/${myUserId}/y`), e.clientY);
            updateFloatingPosition(e.clientX, e.clientY);
        });

        // Lắng nghe dữ liệu Game
        onValue(ref(db, 'gameState/currentPart'), (snapshot) => {
            const part = snapshot.val();
            if (part !== null && part !== undefined && part !== currentPartIndex) {
                currentPartIndex = part;
                document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active', idx === part);
                });
                resetLocalSelection();
                resetResetButton(); 
            }
        });

        onValue(ref(db, 'gameState/board'), (snapshot) => {
            const boardState = snapshot.val();
            renderBoardRealtime(boardState);
        });

        function updateFloatingPosition(clientX, clientY) {
            if (selectedWordLocal) {
                floatingEl.style.left = clientX + 'px';
                floatingEl.style.top = clientY + 'px';
            }
        }

        function resetLocalSelection() {
            selectedWordLocal = null;
            isCheckedState = false; // Tắt cờ xem kết quả khi có tương tác mới
            floatingEl.style.display = 'none';
            floatingEl.innerText = '';
            set(ref(db, `presence/${myUserId}/holdingWord`), "");
            document.querySelectorAll('.clickable-word').forEach(el => el.classList.remove('selected'));
        }

        function resetResetButton() {
            resetClickCount = 0;
            resetBtn.innerText = "Reset (3)";
        }

        function generateFreshBoard(partIdx) {
            const partData = allPartsData[partIdx];
            let englishWords = [];
            partData.forEach(item => englishWords = englishWords.concat(item.eng));
            englishWords.sort(() => Math.random() - 0.5);
            let shuffledRows = [...partData].map((item, idx) => ({ vi: item.vi, engOriginal: item.eng, id: idx })).sort(() => Math.random() - 0.5);
            
            return {
                partIndex: partIdx,
                pool: englishWords,
                zones: shuffledRows.map(row => ({ id: row.id, vi: row.vi, answers: row.engOriginal.join(','), currentWords: [] }))
            };
        }

        // Đưa sự kiện trả từ về kho ra ngoài để tránh bị gán lại liên tục
        vocabPool.addEventListener('click', () => {
            if (selectedWordLocal) {
                const wordText = selectedWordLocal.text;
                const source = selectedWordLocal.source;

                if (source.startsWith('zone-')) {
                    const zoneId = parseInt(source.replace('zone-', ''));
                    runTransaction(ref(db, 'gameState/board'), (currentBoard) => {
                        if (currentBoard) {
                            const targetZone = currentBoard.zones.find(z => z.id === zoneId);
                            if (targetZone && targetZone.currentWords && targetZone.currentWords.includes(wordText)) {
                                targetZone.currentWords = targetZone.currentWords.filter(w => w !== wordText);
                                if (!currentBoard.pool) currentBoard.pool = [];
                                currentBoard.pool.push(wordText);
                            }
                        }
                        return currentBoard;
                    }).then((result) => {
                        if(result.committed) resetLocalSelection();
                    });
                }
            }
        });

        // --- Đồng bộ hóa bàn cờ thực ---
        function renderBoardRealtime(boardState) {
            if (!boardState || boardState.partIndex !== currentPartIndex) {
                vocabPool.innerHTML = "<div style='color: #666;'>Đang tạo phòng dữ liệu...</div>";
                const initialBoard = generateFreshBoard(currentPartIndex);
                set(ref(db, 'gameState/board'), initialBoard);
                return;
            }

            vocabPool.innerHTML = "";
            gameGrid.innerHTML = "";

            // 1. Kho chứa từ (Pool)
            if (boardState.pool) {
                boardState.pool.forEach((word) => {
                    const wordEl = document.createElement('div');
                    wordEl.classList.add('clickable-word');
                    wordEl.innerText = word;

                    if (selectedWordLocal && selectedWordLocal.text === word && selectedWordLocal.source === 'pool') {
                        wordEl.classList.add('selected');
                    }

                    wordEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (selectedWordLocal && selectedWordLocal.text === word && selectedWordLocal.source === 'pool') {
                            resetLocalSelection();
                            return;
                        }
                        
                        isCheckedState = false; // Bỏ chế độ xem kết quả nếu đang giữ từ
                        selectedWordLocal = { text: word, source: 'pool' };
                        document.querySelectorAll('.clickable-word').forEach(el => el.classList.remove('selected'));
                        wordEl.classList.add('selected');
                        
                        floatingEl.innerText = word;
                        floatingEl.style.display = 'block';
                        updateFloatingPosition(e.clientX, e.clientY);

                        set(ref(db, `presence/${myUserId}/holdingWord`), word);
                    });
                    vocabPool.appendChild(wordEl);
                });
            }

            // 2. Ô thả từ (Game Grid)
            if (boardState.zones) {
                boardState.zones.forEach((zoneData, index) => {
                    const card = document.createElement('div');
                    card.classList.add('quiz-card');
                    card.style.backgroundColor = pastelColors[index % pastelColors.length];

                    const defEl = document.createElement('div');
                    defEl.classList.add('vietnamese-def');
                    defEl.innerText = `${currentPartIndex * 10 + index + 1}. ${zoneData.vi}`;

                    const dropZone = document.createElement('div');
                    dropZone.classList.add('drop-zone');
                    dropZone.dataset.id = zoneData.id;

                    if (zoneData.currentWords) {
                        const originalData = allPartsData[currentPartIndex][zoneData.id];

                        zoneData.currentWords.forEach(word => {
                            const wordInZoneEl = document.createElement('div');
                            wordInZoneEl.className = 'clickable-word';
                            wordInZoneEl.innerText = word;

                            // LOGIC MỚI: Nếu đang ở trạng thái Kiểm Tra, luôn duy trì màu đúng/sai
                            if (isCheckedState) {
                                if (originalData && originalData.eng.includes(word)) {
                                    wordInZoneEl.style.backgroundColor = "#10b981"; // Đúng -> Màu Xanh
                                } else {
                                    wordInZoneEl.style.backgroundColor = "#ef4444"; // Sai -> Màu Đỏ
                                }
                            }

                            if (selectedWordLocal && selectedWordLocal.text === word && selectedWordLocal.source === `zone-${zoneData.id}`) {
                                wordInZoneEl.classList.add('selected');
                            }

                            wordInZoneEl.addEventListener('click', (e) => {
                                e.stopPropagation();
                                if (selectedWordLocal && selectedWordLocal.text === word && selectedWordLocal.source === `zone-${zoneData.id}`) {
                                    resetLocalSelection();
                                    return;
                                }

                                isCheckedState = false;
                                selectedWordLocal = { text: word, source: `zone-${zoneData.id}` };
                                document.querySelectorAll('.clickable-word').forEach(el => el.classList.remove('selected'));
                                wordInZoneEl.classList.add('selected');
                                
                                floatingEl.innerText = word;
                                floatingEl.style.display = 'block';
                                updateFloatingPosition(e.clientX, e.clientY);

                                set(ref(db, `presence/${myUserId}/holdingWord`), word);
                            });

                            dropZone.appendChild(wordInZoneEl);
                        });
                    }

                    dropZone.addEventListener('click', () => {
                        if (selectedWordLocal) {
                            const wordText = selectedWordLocal.text;
                            const source = selectedWordLocal.source;
                            const targetZoneId = zoneData.id;

                            runTransaction(ref(db, 'gameState/board'), (currentBoard) => {
                                if (!currentBoard) return currentBoard;

                                if (source === 'pool') {
                                    if (currentBoard.pool && currentBoard.pool.includes(wordText)) {
                                        currentBoard.pool = currentBoard.pool.filter(w => w !== wordText);
                                        const targetZone = currentBoard.zones.find(z => z.id === targetZoneId);
                                        if (!targetZone.currentWords) targetZone.currentWords = [];
                                        targetZone.currentWords.push(wordText);
                                    } else {
                                        return;
                                    }
                                } 
                                else if (source.startsWith('zone-')) {
                                    const oldZoneId = parseInt(source.replace('zone-', ''));
                                    if (oldZoneId === targetZoneId) return currentBoard;

                                    const oldZone = currentBoard.zones.find(z => z.id === oldZoneId);
                                    if (oldZone && oldZone.currentWords && oldZone.currentWords.includes(wordText)) {
                                        oldZone.currentWords = oldZone.currentWords.filter(w => w !== wordText);
                                        const targetZone = currentBoard.zones.find(z => z.id === targetZoneId);
                                        if (!targetZone.currentWords) targetZone.currentWords = [];
                                        targetZone.currentWords.push(wordText);
                                    } else {
                                        return;
                                    }
                                }
                                return currentBoard;
                            }).then((result) => {
                                if (result.committed) {
                                    resetLocalSelection();
                                } else {
                                    alert(`Ối! Từ "${wordText}" đã bị một người chơi khác thao tác trước mất rồi.`);
                                    resetLocalSelection();
                                }
                            });
                        }
                    });

                    card.appendChild(defEl);
                    card.appendChild(dropZone);
                    gameGrid.appendChild(card);
                });
            }
        }

        // --- Sự kiện Tab đổi Phần chơi ---
        document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                isCheckedState = false;
                set(ref(db, 'gameState/currentPart'), idx);
                const freshBoard = generateFreshBoard(idx);
                set(ref(db, 'gameState/board'), freshBoard);
                resultMessage.innerText = "";
            });
        });

        // --- Kiểm tra Kết Quả ---
        document.getElementById('check-btn').addEventListener('click', () => {
            isCheckedState = true; // BẬT CỜ KIỂM TRA
            
            const dropZones = document.querySelectorAll('.drop-zone');
            let totalWordsInPart = 0;
            let correctWordsCount = 0;
            let totalUserWords = 0;

            allPartsData[currentPartIndex].forEach(item => totalWordsInPart += item.eng.length);

            dropZones.forEach(zone => {
                const zoneId = parseInt(zone.dataset.id);
                const originalData = allPartsData[currentPartIndex][zoneId];
                const correctAnswers = originalData.eng;
                const childWords = Array.from(zone.children);

                totalUserWords += childWords.length;

                childWords.forEach(wordEl => {
                    const wordText = wordEl.innerText.trim();
                    if (correctAnswers.includes(wordText)) {
                        wordEl.style.backgroundColor = "#10b981";
                        correctWordsCount++;
                    } else {
                        wordEl.style.backgroundColor = "#ef4444";
                    }
                });
            });

            if (correctWordsCount === totalWordsInPart && totalUserWords === totalWordsInPart) {
                resultMessage.style.color = '#10b981';
                resultMessage.innerText = `Xuất sắc! Các bạn đã đưa toàn bộ các từ về đúng vị trí! 🎉`;
                triggerFireworks();
            } else {
                resultMessage.style.color = '#e11d48';
                resultMessage.innerText = `Sắp rồi, cùng xem lại các ô màu đỏ xem nhầm ở đâu nhaaa.`;
            }
        });

        // Hộp nút Reset an toàn
        resetBtn.addEventListener('click', () => {
            resetClickCount++;
            if (resetClickCount < 3) {
                resetBtn.innerText = `Reset (${3 - resetClickCount})`;
                resultMessage.style.color = '#f59e0b';
                resultMessage.innerText = `Nhấn thêm ${3 - resetClickCount} lần nữa để reset bàn cờ.`;
            } else {
                isCheckedState = false;
                const freshBoard = generateFreshBoard(currentPartIndex);
                set(ref(db, 'gameState/board'), freshBoard).then(() => {
                    resetResetButton();
                    resetLocalSelection();
                    resultMessage.style.color = '#10b981';
                    resultMessage.innerText = `Đã làm sạch bàn cờ! Các từ đã được nhả về vị trí cũ.`;
                });
            }
        });

        function triggerFireworks() {
            const end = Date.now() + 3000;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.85 } });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.85 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // Tạo hiệu ứng lá rơi nền
        function createFallingElements() {
            const container = document.getElementById('falling-container');
            const elements = ['🍃', '🌿', '🌸', '🌺', '🌴']; 
            const count = 25; 
            for (let i = 0; i < count; i++) {
                const item = document.createElement('div');
                item.classList.add('leaf');
                item.innerText = elements[Math.floor(Math.random() * elements.length)];
                item.style.left = Math.random() * 100 + 'vw';
                item.style.fontSize = Math.random() * 15 + 15 + 'px';
                item.style.animationDuration = Math.random() * 8 + 6 + 's';
                item.style.animationDelay = Math.random() * -15 + 's'; 
                container.appendChild(item);
            }
        }
        createFallingElements();
    </script>
</body>
</html>
